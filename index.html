<!DOCTYPE html>
<html>
<head>
  <title>Mein McKinsey-Berater</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; }
    #input { width: 70%; padding: 10px; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>🤖 McKinsey Berater</h1>
  <div id="chat"></div>
  <input id="input" placeholder="Dein Business-Problem hier eingeben...">
  <button onclick="sendMessage()">Analysieren lassen</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById('input');
      const chat = document.getElementById('chat');
      
      chat.innerHTML += `<p><strong>Du:</strong> ${input.value}</p>`;
      
      const mckinseyPrompt = `Analysiere als McKinsey-Berater MECE: "${input.value}" 
      1. Executive Summary
      2. 3 Hypothesen 
      3. Datenbedarf
      4. Nächste Schritte`;
      
      chat.innerHTML += `<p><em>🤖 Berater denkt...</em></p>`;
      
      setTimeout(() => {
        chat.innerHTML += `<p><strong>🤖 McKinsey:</strong> 
          <b>EXECUTIVE SUMMARY:</b> Dein Problem braucht strukturierte Analyse.<br>
          <b>Hypothesen:</b> 1. Markt, 2. Kosten, 3. Prozesse.<br>
          <b>Nächste Schritte:</b> Daten sammeln.</p>`;
        chat.scrollTop = chat.scrollHeight;
      }, 2000);
      
      input.value = '';
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
