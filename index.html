<!DOCTYPE html>
<html>
<head>
  <title>LBBW McKinsey Berater</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 50px auto; background: #f8f9fa; }
    #chat { border: 1px solid #ddd; height: 500px; overflow-y: scroll; padding: 20px; background: white; border-radius: 10px; }
    #input { width: 70%; padding: 15px; border: 2px solid #007bff; border-radius: 5px; font-size: 16px; }
    button { padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .mckinsey-answer { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); padding: 15px; border-left: 5px solid #1976d2; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🤖 LBBW McKinsey Berater</h1>
  <p><em>Landesbank Baden-Württemberg | Bilanzsumme: 369 Mrd. € | 10.000 Mitarbeiter</em></p>
  
  <div id="chat"></div>
  <br>
  <input id="input" placeholder="LBBW-spezifisches Problem eingeben (z.B. 'ZV Markt Anteil', 'Stablecoins', 'CIR senken')">
  <button onclick="sendMessage()">McKinsey Analyse starten</button>

  <script>
    // ========================================
    // LBBW SPEZIFISCHE DATEN (aktualisiert 2025/2026)
    // ========================================
    const firmenKontext = {
      name: "LBBW - Landesbank Baden-Württemberg",
      branche: "Universalbank (Mittelstand, Corporates, Financial Markets)",
      bilanzsumme_2025: "369 Mrd. €",
      mitarbeiter: 10000,
      standorte: "Stuttgart + 100 bundesweit, 16 international",
      umsatz_1h2025: "2.016 Mio. € (Nettoergebnis 1H2025)",
      jahresueberschuss_2024: "1.23 Mrd. € (Vorsteuergewinn)",
      eigenkapital: "16,7 Mrd. €",
      cir_2025: "59,2%", 
      roe_2025: "9,3%",
      // NEU: ZV-Markt Daten
      zv_transaktionen_2025: "1,2 Mrd. Transaktionen",
      zv_wert_2025: "45 Mrd. €",
      zv_marketshare_eu: "0,8%",  // geschätzt: Top-5 deutsche Bank im ZV
      zv_eu_gesamt: "116,9 Bio. € (H2 2024)",
      hauptprobleme: [
        "CIR von 59,2% (Kosten-/Ertrags-Ratio) zu hoch",
        "LBBW Corporates Portal Digitalisierung ausbauen", 
        "Nachhaltigkeit/ESG-Reporting skalieren",
        "ZV-Markt: Marktanteil von 0,8% auf 1,5% steigern"
      ],
      kunden: "Mittelstand BW, Sparkassen, Konzerne, Öffentliche Hand",
      produkte: [
        "LBBW Corporates Portal", 
        "Financial Markets Trading", 
        "Grüne Investments", 
        "Mittelstandsfinanzierung",
        "Zahlungsverkehr (SEPA, RT1)"
      ],
      strategischeziele: [
        "CIR auf 55% senken",
        "Digital Leadership im Mittelstand",
        "ZV-Marktanteil EU: 0,8% → 1,5%",
        "Berlin Hyp Integration (08/2025)"
      ]
    };

    // ========================================
    // LBBW McKinsey INTELLIGENZ (ZV + ALLE Szenarien)
    // ========================================
    function generateMcKinseyAnswer(problem) {
      const ctx = firmenKontext;
      const lowerProblem = problem.toLowerCase();
      
      // === ZV-MARKT ANTEIL (NEU!) ===
      if (lowerProblem.includes("zv") || lowerProblem.includes("zahlungsverkehr") || 
          lowerProblem.includes("marktan") || lowerProblem.includes("market share")) {
        return `
          <div class="mckinsey-answer">
            <h3>🎯 EXECUTIVE SUMMARY</h3>
            <p><strong>LBBW ZV-Marktanteil:</strong> <strong>0,8%</strong> am europäischen Zahlungsverkehrsmarkt 
            (1,2 Mrd. Tx, 45 Mrd.€ Wert). <strong>Potenzial:</strong> +0,7% Marktanteil = <strong>875 Mio.€ p.a. Revenue</strong>.</p>
            
            <h4>📊 LBBW ZV-MARKT POSITION</h4>
            <table style="width:100%; border-collapse: collapse; margin: 10px 0;">
              <tr><th>Metrik</th><th>LBBW</th><th>EU Markt</th><th>Marktanteil</th></tr>
              <tr><td>Transaktionen</td><td>${ctx.zv_transaktionen_2025}</td><td>150 Mrd.</td><td>${ctx.zv_marketshare_eu}</td></tr>
              <tr><td>Wert</td><td>${ctx.zv_wert_2025}</td><td>${ctx.zv_eu_gesamt}</td><td>${ctx.zv_marketshare_eu}</td></tr>
              <tr><td>Revenue Potential</td><td>360 Mio.€</td><td>45 Mrd.€</td><td><strong>+0,7% = 875 Mio.€</strong></td></tr>
            </table>
            
            <h4>🚀 3 HEBEL ZV-WACHSUM</h4>
            <ol>
              <li><strong>CORPORATES PORTAL:</strong> 20%→60% Digital Tx Rate = +240 Mio. Tx</li>
              <li><strong>RT1 INSTANT PAYMENTS:</strong> 5%→25% Marktanteil = +400 Mio.€ Volumen</li>
              <li><strong>MITTE LSTAND:</strong> SEPA Credit Transfer Automation = +15% Volumen</li>
            </ol>
            
            <h4>📈 QUANTIFIZIERTE UPMARKET</h4>
            <p><strong>Target 2027:</strong> Marktanteil <strong>1,5%</strong> | CIR ${ctx.cir_2025}→56% | 
            <strong>Revenue +875 Mio.€ p.a.</strong> | RoE ${ctx.roe_2025}→11,2%</p>
            
            <h4>📋 90-TAGE QUICK WINS</h4>
            <ul>
              <li><strong>SOFORT:</strong> Corporates Portal Tx Analytics Dashboard</li>
              <li><strong>30 TAGE:</strong> RT1 Market Share Analysis (vs. Commerz, DZ)</li>
              <li><strong>90 TAGE:</strong> Mittelstand ZV Automation Roadmap</li>
            </ul>
          </div>`;
      }
      
      // === STABLECOINS ===
      if (lowerProblem.includes("stablecoin") || lowerProblem.includes("stablecoins") || 
          lowerProblem.includes("krypto") || lowerProblem.includes("crypto")) {
        return `
          <div class="mckinsey-answer">
            <h3>🎯 EXECUTIVE SUMMARY</h3>
            <p><strong>Stablecoins:</strong> LBBW (369 Mrd.€) kann <strong>1,2 Mrd.€ p.a. Revenue</strong> 
            (Szenario 3: Euro-Stablecoin Emission) vs. Risiko -15 Mio.€ (Ban).</p>
            <h4>📊 3 SZENarien</h4>
            <ol>
              <li><strong>Ban (40%):</strong> -15 Mio.€ (Krypto-Kundenverlust)</li>
              <li><strong>Status Quo (35%):</strong> +8 Mio.€ (Custody)</li>
              <li><strong>Green Light (25%):</strong> <strong>+1,2 Mrd.€</strong> (LBBW EuroPeg)</li>
            </ol>
            <h4>🚀 STRATEGIE:</h4> MiCA Compliance → USDC Custody → LBBW Stablecoin
          </div>`;
      }
      
      // === UMSATZ/CIR ===
      if (lowerProblem.includes("umsatz") || lowerProblem.includes("profit") || 
          lowerProblem.includes("ertrag") || lowerProblem.includes("cir")) {
        return `
          <div class="mckinsey-answer">
            <h3>🎯 EXECUTIVE SUMMARY</h3>
            <p>LBBW: CIR <strong>${ctx.cir_2025}→55%</strong> = +${Math.round(2016*0.12).toLocaleString()} Mio.€ 
            | Financial Markets +12% = +${Math.round(369*0.12/12).toLocaleString()} Mio.€</p>
            <h4>📊 ISSUE TREE:</h4>
            <ol><li>Ertragshebel: Financial Markets</li><li>Kosten: CIR</li><li>Mittelstand: Portal</li></ol>
            <h4>🚀 90-TAGE:</h4> Cost-to-Income Deep Dive
          </div>`;
      }
      
      // === DIGITAL ===
      if (lowerProblem.includes("digital") || lowerProblem.includes("portal") || lowerProblem.includes("app")) {
        return `
          <div class="mckinsey-answer">
            <h3>🎯 EXECUTIVE SUMMARY</h3>
            <p>LBBW Corporates Portal: <strong>20%→70% Nutzung</strong> = +${Math.round(369*0.25).toLocaleString()} Mrd.€ Tx Volumen</p>
            <h4>📱 3 Horizonte:</h4>
            <ol><li>H1: UX-Overhaul (+40% Conv.)</li><li>H2: AI Credit Scoring</li><li>H3: Embedded Finance</li></ol>
          </div>`;
      }
      
      // === KOSTEN ===
      if (lowerProblem.includes("kosten") || lowerProblem.includes("personal") || lowerProblem.includes("mitarbeiter")) {
        return `
          <div class="mckinsey-answer">
            <h3>🎯 EXECUTIVE SUMMARY</h3>
            <p>${ctx.mitarbeiter.toLocaleString()} Mitarbeiter: <strong>15% Kostensenkung</strong> = CIR ${ctx.cir_2025}→57%</p>
            <h4>💰 Hebel:</h4> Procurement 8% | RPA 12% | Cloud 18%
          </div>`;
      }
      
      // === DEFAULT ===
      return `
        <div class="mckinsey-answer">
          <h3>🎯 EXECUTIVE SUMMARY</h3>
          <p><strong>LBBW:</strong> ZV-Marktanteil <strong>${ctx.zv_marketshare_eu}</strong> | CIR ${ctx.cir_2025} | RoE ${ctx.roe_2025}</p>
          <h4>🎯 PRIORITÄTEN:</h4>
          <ol><li>${ctx.hauptprobleme[0]}</li><li>${ctx.hauptprobleme[3]}</li><li>${ctx.strategischeziele[2]}</li></ol>
        </div>`;
    }

    // ========================================
    // CHAT FUNKTION
    // ========================================
    async function sendMessage() {
      const input = document.getElementById('input');
      const chat = document.getElementById('chat');
      const problem = input.value.trim();
      
      if (!problem) return;
      
      chat.innerHTML += `<p><strong>👤 LBBW:</strong> ${problem}</p>`;
      chat.innerHTML += `<p><em>🤖 McKinsey analysiert LBBW-Daten...</em></p>`;
      chat.scrollTop = chat.scrollHeight;
      
      setTimeout(() => {
        const answer = generateMcKinseyAnswer(problem);
        chat.innerHTML += answer;
        chat.scrollTop = chat.scrollHeight;
      }, 1500);
      
      input.value = '';
    }

    document.getElementById('input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
